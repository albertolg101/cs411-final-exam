---
- name: Deploy app as a systemd service on the target machine
  hosts: all
  gather_facts: false
  become: true

  vars:
    app_dir: /opt/myapp
    service_name: myapp

  tasks:
    - name: Install Node.js and npm
      ansible.builtin.apt:
        name:
          - nodejs
          - npm
        state: present
        update_cache: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy package manifests
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ app_dir }}/{{ item }}"
        mode: "0644"
      loop:
        - package.json
        - package-lock.json

    - name: Copy application source
      ansible.builtin.copy:
        src: src/
        dest: "{{ app_dir }}/src/"
        mode: "0644"

    - name: Install production dependencies
      ansible.builtin.command: npm ci --omit=dev
      args:
        chdir: "{{ app_dir }}"

    - name: Install systemd service
      ansible.builtin.copy:
        src: myapp.service
        dest: "/etc/systemd/system/{{ service_name }}.service"
        mode: "0644"

    - name: Enable and restart service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: true
        state: restarted
        daemon_reload: true
